name: watchtower-deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "배포 대상 서비스"
        required: true
        type: choice
        options:
          - backend
          - frontend
        default: backend
      environment:
        description: "배포 환경"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

env:
  SERVICE: ${{ inputs.service }}
  DEPLOY_ENV: ${{ inputs.environment }}
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/watchtower-${{ inputs.service }}-${{ inputs.environment }}
  S3_BUCKET: watchtower-deploy-s3
  CODEDEPLOY_APPLICATION: watchtower-${{ inputs.service }}-${{ inputs.environment }}
  CODEDEPLOY_DEPLOYMENT_GROUP: watchtower-${{ inputs.service }}-${{ inputs.environment }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 이미지 빌드 및 GHCR 푸시
      # 백/프론트 각각의 Dockerfile 사용, 실제 애플리케이션 빌드는 Dockerfile 내부에서 처리
      - name: Build and push image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.SERVICE }}
          file: docker/${{ env.SERVICE }}/Dockerfile
          build-args: |
            SPRING_PROFILE=${{ env.DEPLOY_ENV }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # S3에는 appspec.yml + scripts/ 디렉터리만 전송됨 (이미지는 GHCR에 있음)
      # 레포 전체를 압축할 필요가 없으므로 필요한 파일만 모아서 zip
      # appspec.yml은 동적 인자를 못받으므로, 사용자가 선택한 service 랑 env 이미지 태그를 run_deploy.sh 안에 직접 박아넣음
      - name: Create deployment bundle (appspec + scripts only)
        run: |
          mkdir -p deploy-bundle/scripts
          cp appspec.yml deploy-bundle/
          cp scripts/deploy.sh deploy-bundle/scripts/
          cp scripts/run_deploy.sh deploy-bundle/scripts/

          cat > deploy-bundle/deploy.env <<EOF
          SERVICE=${{ env.SERVICE }}
          DEPLOY_ENV=${{ env.DEPLOY_ENV }}
          IMAGE_TAG=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          EOF

          cd deploy-bundle && zip -r ../deploy-bundle.zip . && cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload bundle to S3
        run: |
          aws s3 cp deploy-bundle.zip \
            s3://${{ env.S3_BUCKET }}/watchtower-${{ env.SERVICE }}-${{ env.DEPLOY_ENV }}/${{ github.sha }}.zip

      - name: Trigger CodeDeploy deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APPLICATION }} \
            --deployment-group-name ${{ env.CODEDEPLOY_DEPLOYMENT_GROUP }} \
            --s3-location bucket=${{ env.S3_BUCKET }},key=watchtower-${{ env.SERVICE }}-${{ env.DEPLOY_ENV }}/${{ github.sha }}.zip,bundleType=zip \
            --query 'deploymentId' --output text)
          echo "Deployment ID: ${DEPLOYMENT_ID}"
          echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "$GITHUB_ENV"

      - name: Wait for deployment to finish
        run: |
          aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}"