name: watchtower-deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "배포 대상 서비스"
        required: true
        type: choice
        options:
          - backend
          - frontend
        default: backend
      environment:
        description: "배포 환경"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

env:
  SERVICE: ${{ inputs.service }}
  DEPLOY_ENV: ${{ inputs.environment }}
  ECR_REPOSITORY: watchtower-${{ inputs.service }}-ecr
  ECS_CLUSTER: watchtower-cluster
  ECS_SERVICE: watchtower-${{ inputs.service }}-${{ inputs.environment }}-task-service
  # TODO: 리소스 이름 추후에 바꿔야 할것 같음
  TASK_CONTAINER_NAME: watchtower-${{ inputs.service }}-ecr

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        if: env.SERVICE == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Build backend jar
        if: env.SERVICE == 'backend'
        run: |
          cd backend
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Set up Node
        if: env.SERVICE == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        if: env.SERVICE == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ env.SERVICE }}-${{ env.DEPLOY_ENV }}-${{ github.sha }}
        run: |
          docker build \
            -f ${{ env.SERVICE }}/Dockerfile \
            --build-arg SPRING_PROFILE=${{ env.DEPLOY_ENV }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            ./${{ env.SERVICE }}

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      # ecs/task-definition.{service}.{env}.json 을 템플릿으로 사용
      - name: Render task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-definition.${{ env.SERVICE }}.${{ env.DEPLOY_ENV }}.json
          container-name: ${{ env.TASK_CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true