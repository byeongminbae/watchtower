version: 0.0
os: linux

files:
  - source: /scripts
    destination: /home/ec2-user/deploy
  - source: /deploy.env
    destination: /home/ec2-user/deploy

permissions:
  - object: /home/ec2-user/deploy
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: "755"

hooks:
  ApplicationStart:
    - location: scripts/run_deploy.sh
      timeout: 180
      runas: ec2-user